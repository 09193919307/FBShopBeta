version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: fbshop
      POSTGRES_USER: fbshop_user
      POSTGRES_PASSWORD: fbshop_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - fbshop_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fbshop_backend
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=fbshop
      - DB_USERNAME=fbshop_user
      - DB_PASSWORD=fbshop_password
      - SESSION_DOMAIN=localhost
      - SANCTUM_STATEFUL_DOMAINS=localhost:5173
      - FRONTEND_URL=http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
    networks:
      - fbshop_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fbshop_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - fbshop_net
    environment:
      - VITE_API_URL=http://localhost:8000

volumes:
  db_data:

networks:
  fbshop_net:
    driver: bridge
